name: Daily AI Briefing

on:
  schedule:
    # Primary: 10:30 UTC weekdays (6:30 AM EDT / 5:30 AM EST — NYC morning)
    - cron: '30 10 * * 1-5'
    # Backstop: 12:30 UTC weekdays. GitHub Actions scheduled workflows are
    # unreliable — runs can be delayed for hours or skipped entirely during
    # high load. The dedupe guard below makes it safe to fire both: if the
    # primary already published today's episode, this run exits early.
    - cron: '30 12 * * 1-5'
  workflow_dispatch:  # Allow manual trigger

# Required so the Action can commit to gh-pages
permissions:
  contents: write

jobs:
  run-briefing:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Skip if today already published
        id: dedupe
        run: |
          DATE=$(date -u +%Y-%m-%d)
          FEED=$(curl -fsSL "https://raw.githubusercontent.com/${{ github.repository }}/gh-pages/feed.xml" 2>/dev/null || true)
          if printf '%s' "$FEED" | grep -q "$DATE</title>"; then
            echo "Episode for $DATE already in feed — skipping pipeline."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "No episode for $DATE yet — will publish."
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        if: steps.dedupe.outputs.skip != 'true'
        run: npm ci

      - name: Write GCP credentials
        if: steps.dedupe.outputs.skip != 'true'
        run: echo '${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}' > gcp-key.json

      - name: Run pipeline
        if: steps.dedupe.outputs.skip != 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_APPLICATION_CREDENTIALS: ./gcp-key.json
          TWITTER_BEARER_TOKEN: ${{ secrets.TWITTER_BEARER_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PAGES_BASE_URL: ${{ vars.PAGES_BASE_URL }}
          PODCAST_TITLE: ${{ vars.PODCAST_TITLE }}
          PODCAST_AUTHOR: ${{ secrets.PODCAST_AUTHOR }}
          PODCAST_OWNER_EMAIL: ${{ secrets.PODCAST_OWNER_EMAIL }}
        run: node src/index.js

      - name: Cleanup
        if: always()
        run: |
          rm -f gcp-key.json
          rm -f /tmp/*.mp3
          rm -f /tmp/*.txt
